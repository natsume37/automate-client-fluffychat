name: Pull Request Workflow

on:
  pull_request:
  merge_group:

jobs:
  code_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: ./scripts/generate-locale-config.sh
      - run: git diff --exit-code
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Check formatting
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'merge_group' && github.event.merge_group.base_sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.sha }}
        run: ./scripts/ci/check_format_changed_dart.sh
      - name: Check import formatting
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'merge_group' && github.event.merge_group.base_sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.sha }}
        run: ./scripts/ci/check_import_sort_changed_dart.sh
      - name: Check license compliance
        run: dart run license_checker check-licenses -c licenses.yaml --problematic
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Add Firebase Messaging
        run: ./scripts/add-firebase-messaging.sh
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - run: flutter test

  build_debug_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "zulu"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: ./.github/actions/free_up_space
      - uses: moonrepo/setup-rust@v1
      - name: Prepare temporary Android signing
        run: |
          cd android
          keytool -genkey -keyalg RSA -alias key -keysize 4096 \
            -dname "cn=FluffyChat CI, ou=CI, o=FluffyChat, c=US" \
            -keypass FLUFFYCHAT -storepass FLUFFYCHAT -validity 1 \
            -keystore key.jks -storetype pkcs12
          {
            echo "storePassword=FLUFFYCHAT"
            echo "keyPassword=FLUFFYCHAT"
            echo "keyAlias=key"
            echo "storeFile=../key.jks"
          } >> key.properties
      - run: flutter pub get
      - name: Ensure Android NDK
        run: bash ./scripts/ci/ensure_android_ndk.sh
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
        run: python3 scripts/ci/write_flutter_env.py --output ci.env.json
      - run: flutter build apk --debug --target-platform android-arm64 --dart-define-from-file=ci.env.json

  build_debug_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - run: flutter pub get
      - name: Prepare web
        run: ./scripts/prepare-web.sh
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
        run: python3 scripts/ci/write_flutter_env.py --output ci.env.json
      - run: flutter build web --dart-define-from-file=ci.env.json

  build_debug_linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest'}}
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install git wget curl clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev libjsoncpp-dev cmake-data libsecret-1-dev libsecret-1-0 librhash0 libssl-dev libwebkit2gtk-4.1-dev -y
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
      - name: Install Flutter
        run: |
          git clone --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git
          ./flutter/bin/flutter doctor
      - uses: moonrepo/setup-rust@v1
      - run: ./flutter/bin/flutter pub get
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
        run: python3 scripts/ci/write_flutter_env.py --output ci.env.json
      - run: ./flutter/bin/flutter build linux --target-platform linux-${{ matrix.arch }} --dart-define-from-file=ci.env.json
