name: Cross Platform CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      upload_to_cos:
        description: Upload generated artifacts to Tencent COS
        required: false
        type: boolean
        default: false
      target_channel:
        description: Optional channel pointer to update
        required: false
        type: choice
        default: none
        options:
          - none
          - dev
          - test
          - release
      app_name:
        description: Application name used in COS object keys
        required: false
        type: string
        default: fluffychat

concurrency:
  group: cross-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Check formatting
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: ./scripts/ci/check_format_changed_dart.sh
      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Unit tests
        run: flutter test

  build_linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libjsoncpp-dev \
            cmake-data \
            libsecret-1-dev \
            libsecret-1-0 \
            librhash0 \
            libssl-dev \
            libwebkit2gtk-4.1-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: flutter pub get
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
          PUSH_ANDROID_APP_KEY: ${{ vars.PUSH_ANDROID_APP_KEY != '' && vars.PUSH_ANDROID_APP_KEY || secrets.PUSH_ANDROID_APP_KEY }}
          PUSH_ANDROID_APP_SECRET: ${{ vars.PUSH_ANDROID_APP_SECRET != '' && vars.PUSH_ANDROID_APP_SECRET || secrets.PUSH_ANDROID_APP_SECRET }}
          PUSH_IOS_APP_KEY: ${{ vars.PUSH_IOS_APP_KEY != '' && vars.PUSH_IOS_APP_KEY || secrets.PUSH_IOS_APP_KEY }}
          PUSH_IOS_APP_SECRET: ${{ vars.PUSH_IOS_APP_SECRET != '' && vars.PUSH_IOS_APP_SECRET || secrets.PUSH_IOS_APP_SECRET }}
          STRICT_BUILD_CONFIG: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
        run: |
          args=(--output ci.env.json)
          if [ "$STRICT_BUILD_CONFIG" = "true" ]; then
            args+=(
              --require APP_NAME
              --require K8S_NAMESPACE
              --require API_BASE_URL
              --require MATRIX_HOMESERVER
            )
          fi
          python3 scripts/ci/write_flutter_env.py "${args[@]}"
      - run: flutter build linux --release --dart-define-from-file=ci.env.json
      - name: Pack Linux artifact
        run: tar -czf fluffychat-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: Pack Ubuntu .deb artifact
        run: bash ./scripts/ci/package_linux_deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: fluffychat-linux-x64
          path: |
            fluffychat-linux-x64.tar.gz
            build/linux/psygo-linux-amd64.deb

  build_windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Load versions
        shell: bash
        run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: flutter pub get
      - name: Generate Flutter build env
        shell: bash
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
          PUSH_ANDROID_APP_KEY: ${{ vars.PUSH_ANDROID_APP_KEY != '' && vars.PUSH_ANDROID_APP_KEY || secrets.PUSH_ANDROID_APP_KEY }}
          PUSH_ANDROID_APP_SECRET: ${{ vars.PUSH_ANDROID_APP_SECRET != '' && vars.PUSH_ANDROID_APP_SECRET || secrets.PUSH_ANDROID_APP_SECRET }}
          PUSH_IOS_APP_KEY: ${{ vars.PUSH_IOS_APP_KEY != '' && vars.PUSH_IOS_APP_KEY || secrets.PUSH_IOS_APP_KEY }}
          PUSH_IOS_APP_SECRET: ${{ vars.PUSH_IOS_APP_SECRET != '' && vars.PUSH_IOS_APP_SECRET || secrets.PUSH_IOS_APP_SECRET }}
          STRICT_BUILD_CONFIG: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
        run: |
          args=(--output ci.env.json)
          if [ "$STRICT_BUILD_CONFIG" = "true" ]; then
            args+=(
              --require APP_NAME
              --require K8S_NAMESPACE
              --require API_BASE_URL
              --require MATRIX_HOMESERVER
            )
          fi
          python scripts/ci/write_flutter_env.py "${args[@]}"
      - run: flutter build windows --release --dart-define-from-file=ci.env.json
      - uses: actions/upload-artifact@v4
        with:
          name: fluffychat-windows
          path: build/windows/x64/runner/Release
          if-no-files-found: error

  build_android_apk:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: zulu
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@v1
      - name: Prepare temporary Android signing
        run: |
          cd android
          keytool -genkey -keyalg RSA -alias key -keysize 4096 \
            -dname "cn=FluffyChat CI, ou=CI, o=FluffyChat, c=US" \
            -keypass FLUFFYCHAT -storepass FLUFFYCHAT -validity 1 \
            -keystore key.jks -storetype pkcs12
          {
            echo "storePassword=FLUFFYCHAT"
            echo "keyPassword=FLUFFYCHAT"
            echo "keyAlias=key"
            echo "storeFile=../key.jks"
          } >> key.properties
      - run: flutter pub get
      - name: Ensure Android NDK
        run: bash ./scripts/ci/ensure_android_ndk.sh
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
          PUSH_ANDROID_APP_KEY: ${{ vars.PUSH_ANDROID_APP_KEY != '' && vars.PUSH_ANDROID_APP_KEY || secrets.PUSH_ANDROID_APP_KEY }}
          PUSH_ANDROID_APP_SECRET: ${{ vars.PUSH_ANDROID_APP_SECRET != '' && vars.PUSH_ANDROID_APP_SECRET || secrets.PUSH_ANDROID_APP_SECRET }}
          PUSH_IOS_APP_KEY: ${{ vars.PUSH_IOS_APP_KEY != '' && vars.PUSH_IOS_APP_KEY || secrets.PUSH_IOS_APP_KEY }}
          PUSH_IOS_APP_SECRET: ${{ vars.PUSH_IOS_APP_SECRET != '' && vars.PUSH_IOS_APP_SECRET || secrets.PUSH_IOS_APP_SECRET }}
          STRICT_BUILD_CONFIG: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
        run: |
          args=(--output ci.env.json)
          if [ "$STRICT_BUILD_CONFIG" = "true" ]; then
            args+=(
              --require APP_NAME
              --require K8S_NAMESPACE
              --require API_BASE_URL
              --require MATRIX_HOMESERVER
            )
          fi
          python3 scripts/ci/write_flutter_env.py "${args[@]}"
      - run: flutter build apk --release --target-platform android-arm64 --dart-define-from-file=ci.env.json
      - name: Normalize Android artifact name
        run: |
          set -euo pipefail
          mkdir -p build/android
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk build/android/fluffychat-android-apk.apk
          elif [ -f build/app/outputs/apk/release/app-release.apk ]; then
            cp build/app/outputs/apk/release/app-release.apk build/android/fluffychat-android-apk.apk
          else
            echo "Android APK not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: fluffychat-android-apk
          path: build/android/fluffychat-android-apk.apk
          if-no-files-found: error

  build_web:
    name: Build Web
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@v1
      - run: flutter pub get
      - name: Generate Flutter build env
        env:
          APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || secrets.APP_NAME }}
          APP_ID_SUFFIX: ${{ vars.APP_ID_SUFFIX != '' && vars.APP_ID_SUFFIX || secrets.APP_ID_SUFFIX }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE }}
          API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || secrets.API_BASE_URL }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER != '' && vars.MATRIX_HOMESERVER || secrets.MATRIX_HOMESERVER }}
          CHATBOT_BASE_URL: ${{ vars.CHATBOT_BASE_URL != '' && vars.CHATBOT_BASE_URL || secrets.CHATBOT_BASE_URL }}
          PUSH_ANDROID_APP_KEY: ${{ vars.PUSH_ANDROID_APP_KEY != '' && vars.PUSH_ANDROID_APP_KEY || secrets.PUSH_ANDROID_APP_KEY }}
          PUSH_ANDROID_APP_SECRET: ${{ vars.PUSH_ANDROID_APP_SECRET != '' && vars.PUSH_ANDROID_APP_SECRET || secrets.PUSH_ANDROID_APP_SECRET }}
          PUSH_IOS_APP_KEY: ${{ vars.PUSH_IOS_APP_KEY != '' && vars.PUSH_IOS_APP_KEY || secrets.PUSH_IOS_APP_KEY }}
          PUSH_IOS_APP_SECRET: ${{ vars.PUSH_IOS_APP_SECRET != '' && vars.PUSH_IOS_APP_SECRET || secrets.PUSH_IOS_APP_SECRET }}
          STRICT_BUILD_CONFIG: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
        run: |
          args=(--output ci.env.json)
          if [ "$STRICT_BUILD_CONFIG" = "true" ]; then
            args+=(
              --require APP_NAME
              --require K8S_NAMESPACE
              --require API_BASE_URL
              --require MATRIX_HOMESERVER
            )
          fi
          python3 scripts/ci/write_flutter_env.py "${args[@]}"
      - run: flutter build web --release --dart-define-from-file=ci.env.json
      - name: Pack Web artifact
        run: tar -czf fluffychat-web.tar.gz -C build/web .
      - uses: actions/upload-artifact@v4
        with:
          name: fluffychat-web
          path: fluffychat-web.tar.gz

  publish_to_cos:
    name: Publish Artifacts To COS
    if: github.event_name == 'workflow_dispatch' && (inputs.upload_to_cos == true || inputs.target_channel != 'none')
    needs:
      - build_linux
      - build_web
      - build_windows
      - build_android_apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fluffychat-*
          path: downloaded_artifacts
          merge-multiple: false

      - name: Collect artifacts by platform
        run: |
          set -euo pipefail
          mkdir -p dist

          for artifact_dir in downloaded_artifacts/*; do
            [ -d "$artifact_dir" ] || continue
            artifact_name="$(basename "$artifact_dir")"

            case "$artifact_name" in
              fluffychat-android-*) platform="android" ;;
              fluffychat-linux-*) platform="linux" ;;
              fluffychat-web*) platform="web" ;;
              fluffychat-windows*) platform="windows" ;;
              *)
                echo "Skip unsupported artifact name: $artifact_name"
                continue
                ;;
            esac

            mkdir -p "dist/$platform"
            while IFS= read -r -d '' file_path; do
              cp "$file_path" "dist/$platform/$(basename "$file_path")"
            done < <(find "$artifact_dir" -type f -print0)
          done

          find dist -type f | sort

      - name: Compute build version
        id: build_version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          build_version="$(python3 -c 'import os; print("{:.2f}".format(int(os.environ["RUN_NUMBER"]) / 100))')"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${build_version}"

      - name: Generate immutable manifest
        env:
          APP_NAME: ${{ inputs.app_name }}
          CHANNEL: ${{ inputs.target_channel }}
          GIT_SHA: ${{ github.sha }}
          BUILD_VERSION: ${{ steps.build_version.outputs.build_version }}
        run: |
          set -euo pipefail
          mkdir -p manifests
          scripts/ci/generate_cos_manifest.py \
            --app-name "$APP_NAME" \
            --build-version "$BUILD_VERSION" \
            --channel "$CHANNEL" \
            --git-sha "$GIT_SHA" \
            --input-dir dist \
            --output "manifests/${BUILD_VERSION}.json"

      - name: Install coscmd
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install coscmd

      - name: Configure COS credentials
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          set -euo pipefail
          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION" \
            -m 30

      - name: Upload artifacts and manifest
        env:
          APP_NAME: ${{ inputs.app_name }}
          CHANNEL: ${{ inputs.target_channel }}
          GIT_SHA: ${{ github.sha }}
          BUILD_VERSION: ${{ steps.build_version.outputs.build_version }}
        run: |
          set -euo pipefail
          date -u '+Upload start: %Y-%m-%dT%H:%M:%SZ'
          for platform_dir in dist/*; do
            [ -d "$platform_dir" ] || continue
            platform_name="$(basename "$platform_dir")"
            file_count="$(find "$platform_dir" -maxdepth 1 -type f | wc -l)"
            total_bytes="$(find "$platform_dir" -maxdepth 1 -type f -printf '%s\n' | awk '{sum += $1} END {print sum + 0}')"
            echo "Uploading platform directory: ${platform_name}"
            echo "  files=${file_count} total_bytes=${total_bytes}"
            find "$platform_dir" -maxdepth 1 -type f -printf '  %f %s bytes\n'
            object_prefix="artifacts/${APP_NAME}/${BUILD_VERSION}/${GIT_SHA}/${platform_name}"
            date -u "+  ${platform_name} upload start: %Y-%m-%dT%H:%M:%SZ"
            coscmd upload -rs "$platform_dir" "$object_prefix"
            date -u "+  ${platform_name} upload end: %Y-%m-%dT%H:%M:%SZ"
            if [ "$CHANNEL" != "none" ]; then
              channel_object_prefix="${CHANNEL}/${platform_name}"
              date -u "+  ${platform_name} channel upload start: %Y-%m-%dT%H:%M:%SZ"
              coscmd upload -rs "$platform_dir" "$channel_object_prefix"
              date -u "+  ${platform_name} channel upload end: %Y-%m-%dT%H:%M:%SZ"
            fi
          done

          echo "Uploading manifest"
          date -u '+  manifest upload start: %Y-%m-%dT%H:%M:%SZ'
          coscmd upload -f "manifests/${BUILD_VERSION}.json" "manifests/${BUILD_VERSION}.json"
          date -u '+  manifest upload end: %Y-%m-%dT%H:%M:%SZ'
          if [ "$CHANNEL" != "none" ]; then
            echo "Uploading channel manifest"
            date -u '+  channel manifest upload start: %Y-%m-%dT%H:%M:%SZ'
            coscmd upload -f "manifests/${BUILD_VERSION}.json" "${CHANNEL}/manifest.json"
            date -u '+  channel manifest upload end: %Y-%m-%dT%H:%M:%SZ'
          fi
          date -u '+Upload end: %Y-%m-%dT%H:%M:%SZ'

      - name: Write channel pointer
        if: inputs.target_channel != 'none'
        env:
          CHANNEL: ${{ inputs.target_channel }}
          APP_NAME: ${{ inputs.app_name }}
          BUILD_VERSION: ${{ steps.build_version.outputs.build_version }}
          GIT_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          scripts/ci/write_channel_pointer.py \
            --channel "$CHANNEL" \
            --app-name "$APP_NAME" \
            --build-version "$BUILD_VERSION" \
            --git-sha "$GIT_SHA" \
            --channel-artifacts-prefix "${CHANNEL}" \
            --manifest-key "manifests/${BUILD_VERSION}.json" \
            --source-run-id "$GITHUB_RUN_ID" \
            --source-ref "$GITHUB_REF_NAME" \
            --output "channels/${CHANNEL}.json"

      - name: Upload channel pointer
        if: inputs.target_channel != 'none'
        env:
          CHANNEL: ${{ inputs.target_channel }}
        run: |
          set -euo pipefail
          coscmd upload -f "channels/${CHANNEL}.json" "channels/${CHANNEL}.json"
